services:
  db:
    image: postgis/postgis:16-3.4
    container_name: georgia-webapp-db
    environment:
      POSTGRES_DB: georgia_webapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d georgia_webapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: georgia-webapp-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      API_PREFIX: /api
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/georgia_webapp
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DEFAULT_STATE: ga
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: georgia-webapp-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_MAP_PROVIDER: maplibre
      VITE_MAP_STYLE_URL: https://basemaps.cartocdn.com/gl/positron-gl-style/style.json
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:

